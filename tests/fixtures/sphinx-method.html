<h1>AcquireCounteragent<a class="headerlink" href="#acquirecounteragent">¶</a></h1>
<p>Send an invitation to add the organization as a counteragent.</p>
<h2>Request<a class="headerlink" href="#request">¶</a></h2>
<div class="highlight-http"><div class="highlight"><pre>
<span>POST /AcquireCounteragent HTTP/1.1</span>
<span>Authorization: DiadocAuth ddauth_api_client_id=...</span>
</pre></div></div>
<h2>Parameters<a class="headerlink" href="#parameters">¶</a></h2>
<ul>
<li><strong>myOrgId</strong> — sender organization id</li>
<li><strong>counteragentOrgId</strong> — recipient organization id</li>
</ul>
